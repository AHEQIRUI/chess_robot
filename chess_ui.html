<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>国际象棋</title>
    <style>
        body {
            background: #2c2c2c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
        }

        .square {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .white-square {
            background: #f0d9b5;
        }

        .black-square {
            background: #b58863;
        }

        .selected {
            background: #7f7 !important;
        }

        #fen {
            width: 480px;
            margin-top: 16px;
            font-size: 16px;
            padding: 8px;
            box-sizing: border-box;
        }

        .controls {
            margin-top: 16px;
            display: flex;
            gap: 8px;
        }

        button {
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
        }

        .promotion-dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #444;
            padding: 20px;
            border-radius: 8px;
            display: none;
            z-index: 100;
        }

        .promotion-dialog.show {
            display: block;
        }

        .promotion-options {
            display: flex;
            gap: 8px;
        }

        .promotion-options div {
            padding: 10px;
            cursor: pointer;
            background: #666;
            border-radius: 4px;
        }

        .promotion-options div:hover {
            background: #888;
        }
    </style>
</head>
<body>
    <div id="board"></div>
    <input type="text" id="fen" placeholder="FEN">
    <div class="controls">
        <button id="undoBtn">悔棋</button>
        <button id="aiBtn">AI走法</button>
    </div>
    <div id="promotionDialog" class="promotion-dialog">
        <div>选择升变棋子:</div>
        <div class="promotion-options" id="promotionOptions"></div>
    </div>

    <script>
        const board = document.getElementById('board');
        const fenInput = document.getElementById('fen');

        const pieceSVGs = {

            Q: '<svg viewBox="0 0 45 45" width="50" height="50"><g fill="#fff" stroke="#000" stroke-width="1.5" stroke-linejoin="round"><path d="M8 12a2 2 0 1 1-4 0 2 2 0 1 1 4 0zm16.5-4.5a2 2 0 1 1-4 0 2 2 0 1 1 4 0zM41 12a2 2 0 1 1-4 0 2 2 0 1 1 4 0zM16 8.5a2 2 0 1 1-4 0 2 2 0 1 1 4 0zM33 9a2 2 0 1 1-4 0 2 2 0 1 1 4 0z"/><path d="M9 26c8.5-1.5 21-1.5 27 0l2-12-7 11V11l-5.5 13.5-3-15-3 15-5.5-14V25L7 14l2 12z" stroke-linecap="butt"/><path d="M9 26c0 2 1.5 2 2.5 4 1 1.5 1 1 .5 3.5-1.5 1-1.5 2.5-1.5 2.5-1.5 1.5.5 2.5.5 2.5 6.5 1 16.5 1 23 0 0 0 1.5-1 0-2.5 0 0 .5-1.5-1-2.5-.5-2.5-.5-2 .5-3.5 1-2 2.5-2 2.5-4-8.5-1.5-18.5-1.5-27 0z" stroke-linecap="butt"/><path d="M11.5 30c3.5-1 18.5-1 22 0M12 33.5c6-1 15-1 21 0" fill="none"/></g></svg>',

            N: '<svg viewBox="0 0 45 45" width="50" height="50"><g fill="none" fill-rule="evenodd" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10c10.5 1 16.5 8 16 29H15c0-9 10-6.5 8-21" fill="#fff"/><path d="M24 18c.38 2.91-5.55 7.37-8 9-3 2-2.82 4.34-5 4-1.042-.94 1.41-3.04 0-3-1 0 .19 1.23-1 2-1 0-4.003 1-4-4 0-2 6-12 6-12s1.89-1.9 2-3.5c-.73-.994-.5-2-.5-3 1-1 3 2.5 3 2.5h2s.78-1.992 2.5-3c1 0 1 3 1 3" fill="#fff"/><path d="M9.5 25.5a.5.5 0 1 1-1 0 .5.5 0 1 1 1 0zm5.433-9.75a.5 1.5 30 1 1-.866-.5.5 1.5 30 1 1 .866.5z" fill="#000"/></g></svg>',
            P: '<svg viewBox="0 0 45 45" width="50" height="50"><path d="M22.5 9c-2.21 0-4 1.79-4 4 0 .89.29 1.71.78 2.38C17.33 16.5 16 18.59 16 21c0 2.03.94 3.84 2.41 5.03-3 1.06-7.41 5.55-7.41 13.47h23c0-7.92-4.41-12.41-7.41-13.47 1.47-1.19 2.41-3 2.41-5.03 0-2.41-1.33-4.5-3.28-5.62.49-.67.78-1.49.78-2.38 0-2.21-1.79-4-4-4z" fill="#fff" stroke="#000" stroke-width="1.5" stroke-linecap="round"/></svg>',
            k: '<svg viewBox="0 0 45 45" width="50" height="50"><g fill="none" fill-rule="evenodd" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22.5 11.63V6M20 8h5" stroke-linejoin="miter"/><path d="M22.5 25s4.5-7.5 3-10.5c0 0-1-2.5-3-2.5s-3 2.5-3 2.5c-1.5 3 3 10.5 3 10.5" fill="#000" stroke-linecap="butt" stroke-linejoin="miter"/><path d="M11.5 37c5.5 3.5 15.5 3.5 21 0v-7s9-4.5 6-10.5c-4-6.5-13.5-3.5-16 4V27v-3.5c-3.5-7.5-13-10.5-16-4-3 6 5 10 5 10V37z" fill="#000"/><path d="M11.5 30c5.5-3 15.5-3 21 0m-21 3.5c5.5-3 15.5-3 21 0m-21 3.5c5.5-3 15.5-3 21 0"/></g></svg>',
            q: '<svg viewBox="0 0 45 45" width="50" height="50"><g fill="#000" stroke="#000" stroke-width="1.5" stroke-linejoin="round"><path d="M8 12a2 2 0 1 1-4 0 2 2 0 1 1 4 0zm16.5-4.5a2 2 0 1 1-4 0 2 2 0 1 1 4 0zM41 12a2 2 0 1 1-4 0 2 2 0 1 1 4 0zM16 8.5a2 2 0 1 1-4 0 2 2 0 1 1 4 0zM33 9a2 2 0 1 1-4 0 2 2 0 1 1 4 0z"/><path d="M9 26c8.5-1.5 21-1.5 27 0l2-12-7 11V11l-5.5 13.5-3-15-3 15-5.5-14V25L7 14l2 12z" stroke-linecap="butt"/><path d="M9 26c0 2 1.5 2 2.5 4 1 1.5 1 1 .5 3.5-1.5 1-1.5 2.5-1.5 2.5-1.5 1.5.5 2.5.5 2.5 6.5 1 16.5 1 23 0 0 0 1.5-1 0-2.5 0 0 .5-1.5-1-2.5-.5-2.5-.5-2 .5-3.5 1-2 2.5-2 2.5-4-8.5-1.5-18.5-1.5-27 0z" stroke-linecap="butt"/><path d="M11.5 30c3.5-1 18.5-1 22 0M12 33.5c6-1 15-1 21 0" fill="none"/></g></svg>',
            r: '<svg viewBox="0 0 45 45" width="50" height="50"><g fill="#000" fill-rule="evenodd" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 39h27v-3H9v3zm3-3v-4h21v4H12zm-1-22V9h4v2h5V9h5v2h5V9h4v5" stroke-linecap="butt"/><path d="M34 14l-3 3H14l-3-3"/><path d="M31 17v12.5H14V17" stroke-linecap="butt" stroke-linejoin="miter"/><path d="M31 29.5l1.5 2.5h-20l1.5-2.5"/><path d="M11 14h23" fill="none" stroke-linejoin="miter"/></g></svg>',
            b: '<svg viewBox="0 0 45 45" width="50" height="50"><g fill="none" fill-rule="evenodd" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><g fill="#000" stroke-linecap="butt"><path d="M9 36c3.39-.97 10.11.43 13.5-2 3.39 2.43 10.11 1.03 13.5 2 0 0 1.65.54 3 2-.68.97-1.65.99-3 .5-3.39-.97-10.11.46-13.5-1-3.39 1.46-10.11.03-13.5 1-1.35.49-2.32.47-3-.5 1.35-1.46 3-2 3-2z"/><path d="M15 32c2.5 2.5 12.5 2.5 15 0 .5-1.5 0-2 0-2 0-2.5-2.5-4-2.5-4 5.5-1.5 6-11.5-5-15.5-11 4-10.5 14-5 15.5 0 0-2.5 1.5-2.5 4 0 0-.5.5 0 2z"/><path d="M25 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 1 1 5 0z"/></g><path d="M17.5 26h10M15 30h15m-7.5-14.5v5M20 18h5" stroke-linejoin="miter"/></g></svg>',
            n: '<svg viewBox="0 0 45 45" width="50" height="50"><g fill="none" fill-rule="evenodd" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10c10.5 1 16.5 8 16 29H15c0-9 10-6.5 8-21" fill="#000"/><path d="M24 18c.38 2.91-5.55 7.37-8 9-3 2-2.82 4.34-5 4-1.042-.94 1.41-3.04 0-3-1 0 .19 1.23-1 2-1 0-4.003 1-4-4 0-2 6-12 6-12s1.89-1.9 2-3.5c-.73-.994-.5-2-.5-3 1-1 3 2.5 3 2.5h2s.78-1.992 2.5-3c1 0 1 3 1 3" fill="#000"/><path d="M9.5 25.5a.5.5 0 1 1-1 0 .5.5 0 1 1 1 0zm5.433-9.75a.5 1.5 30 1 1-.866-.5.5 1.5 30 1 1 .866.5z" fill="#fff"/></g></svg>',
            p: '<svg viewBox="0 0 45 45" width="50" height="50"><path d="M22.5 9c-2.21 0-4 1.79-4 4 0 .89.29 1.71.78 2.38C17.33 16.5 16 18.59 16 21c0 2.03.94 3.84 2.41 5.03-3 1.06-7.41 5.55-7.41 13.47h23c0-7.92-4.41-12.41-7.41-13.47 1.47-1.19 2.41-3 2.41-5.03 0-2.41-1.33-4.5-3.28-5.62.49-.67.78-1.49.78-2.38 0-2.21-1.79-4-4-4z" fill="#000" stroke="#000" stroke-width="1.5" stroke-linecap="round"/></svg>'
        };

        const initialPosition = [
            ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'],
            ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['P', 'P', 'P', 'P', 'P', 'P', 'P', 'P'],
            ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R']
        ];

        let boardState = JSON.parse(JSON.stringify(initialPosition));
        let selectedSquare = null;
        let currentTurn = 'white'; // 白方先行
        let moveHistory = []; // 悔棋用的历史记录
        let castlingRights = { K: true, Q: true, k: true, q: true }; // 王车易位权利
        let promotionCallback = null; // 升变选择回调

        function getPieceColor(piece) {
            if (!piece) return null;
            return piece === piece.toUpperCase() ? 'white' : 'black';
        }

        function renderBoard() {
            const squares = board.querySelectorAll('.square');
            squares.forEach(square => {
                const row = parseInt(square.dataset.row);
                const col = parseInt(square.dataset.col);
                const piece = boardState[row][col];
                square.innerHTML = piece ? pieceSVGs[piece] : '';
            });
        }

        function generateFen() {
            let fen = '';
            for (let row = 0; row < 8; row++) {
                let emptyCount = 0;
                for (let col = 0; col < 8; col++) {
                    const piece = boardState[row][col];
                    if (piece === '') {
                        emptyCount++;
                    } else {
                        if (emptyCount > 0) {
                            fen += emptyCount;
                            emptyCount = 0;
                        }
                        fen += piece;
                    }
                }
                if (emptyCount > 0) {
                    fen += emptyCount;
                }
                if (row < 7) fen += '/';
            }
            fen += currentTurn === 'white' ? ' w KQkq' : ' b KQkq';
            return fen;
        }

        function updateFen() {
            fenInput.value = generateFen();
        }

        // 悔棋功能
        function undoMove() {
            if (moveHistory.length === 0) return;

            const lastMove = moveHistory.pop();

            if (lastMove.type === 'castling') {
                // 撤销王车易位
                const row = lastMove.color === 'white' ? 7 : 0;
                if (lastMove.side === 'K') {
                    boardState[row][4] = boardState[row][6];
                    boardState[row][6] = '';
                    boardState[row][7] = boardState[row][5];
                    boardState[row][5] = '';
                } else {
                    boardState[row][4] = boardState[row][2];
                    boardState[row][2] = '';
                    boardState[row][0] = boardState[row][3];
                    boardState[row][3] = '';
                }
                castlingRights = lastMove.prevCastling;
            } else {
                // 撤销普通移动
                boardState[lastMove.from.row][lastMove.from.col] =
                    boardState[lastMove.to.row][lastMove.to.col];
                boardState[lastMove.to.row][lastMove.to.col] = lastMove.captured;
                castlingRights = lastMove.prevCastling;
            }

            currentTurn = lastMove.prevTurn;
            selectedSquare = null;
            const prevSelected = board.querySelector('.selected');
            if (prevSelected) prevSelected.classList.remove('selected');
            renderBoard();
            updateFen();
        }

        document.getElementById('undoBtn').addEventListener('click', undoMove);

        // AI走法
        async function getAiMove() {
            const fen = fenInput.value;
            try {
                const resp = await fetch(`http://localhost:8080/query?fen=${encodeURIComponent(fen)}&depth=15`);
                const data = await resp.json();
                if (data.success) {
                    const move = data.best_move;
                    const from = move.slice(0, 2);
                    const to = move.slice(2, 4);
                    const fromRow = 8 - parseInt(from[1]);
                    const fromCol = from.charCodeAt(0) - 97;
                    const toRow = 8 - parseInt(to[1]);
                    const toCol = to.charCodeAt(0) - 97;

                    // 选中并移动
                    const squares = board.querySelectorAll('.square');
                    const fromSquare = squares[fromRow * 8 + fromCol];
                    const toSquare = squares[toRow * 8 + toCol];

                    fromSquare.classList.add('selected');
                    setTimeout(() => {
                        fromSquare.classList.remove('selected');
                        const piece = boardState[fromRow][fromCol];
                        const captured = boardState[toRow][toCol];
                        moveHistory.push({
                            from: { row: fromRow, col: fromCol },
                            to: { row: toRow, col: toCol },
                            captured: captured,
                            prevTurn: currentTurn,
                            prevCastling: { ...castlingRights }
                        });
                        boardState[toRow][toCol] = piece;
                        boardState[fromRow][fromCol] = '';
                        currentTurn = currentTurn === 'white' ? 'black' : 'white';
                        renderBoard();
                        updateFen();
                    }, 300);
                } else {
                    alert('AI获取失败: ' + (data.error || '未知错误'));
                }
            } catch (e) {
                alert('无法连接到AI服务器，请先运行: python stockfish_server.py');
            }
        }

        document.getElementById('aiBtn').addEventListener('click', getAiMove);

        // 升变对话框
        function showPromotionDialog(color, callback) {
            const dialog = document.getElementById('promotionDialog');
            const options = document.getElementById('promotionOptions');
            options.innerHTML = '';

            const pieces = color === 'white' ? ['Q', 'R', 'B', 'N'] : ['q', 'r', 'b', 'n'];
            const names = color === 'white' ? ['后', '车', '象', '马'] : ['后', '车', '象', '马'];

            pieces.forEach((p, i) => {
                const div = document.createElement('div');
                div.innerHTML = pieceSVGs[p];
                div.title = names[i];
                div.onclick = () => {
                    dialog.classList.remove('show');
                    callback(p);
                };
                options.appendChild(div);
            });

            dialog.classList.add('show');
        }

        // 执行王车易位
        function performCastling(color, side) {
            const row = color === 'white' ? 7 : 0;
            if (side === 'K') {
                // 短易位：王从e到g，车从h到f
                boardState[row][6] = boardState[row][4]; // K/e -> g
                boardState[row][4] = '';
                boardState[row][5] = boardState[row][7]; // R/h -> f
                boardState[row][7] = '';
            } else {
                // 长易位：王从e到c，车从a到d
                boardState[row][2] = boardState[row][4]; // K/e -> c
                boardState[row][4] = '';
                boardState[row][3] = boardState[row][0]; // R/a -> d
                boardState[row][0] = '';
            }
        }

        // 检查是否可以王车易位
        function canCastle(color, side) {
            const row = color === 'white' ? 7 : 0;
            const king = color === 'white' ? 'K' : 'k';
            const rook = color === 'white' ? 'R' : 'r';

            if (boardState[row][4] !== king || boardState[row][7] !== rook) return false;

            const right = color === 'white' ? (side === 'K' ? 'K' : 'Q') : (side === 'K' ? 'k' : 'q');
            if (!castlingRights[right]) return false;

            if (side === 'K') {
                if (boardState[row][5] !== '' || boardState[row][6] !== '') return false;
            } else {
                if (boardState[row][1] !== '' || boardState[row][2] !== '' || boardState[row][3] !== '') return false;
            }

            return true;
        }

        // 检查兵是否到达升变格
        function needsPromotion(piece, row) {
            if (piece !== 'P' && piece !== 'p') return false;
            return (piece === 'P' && row === 0) || (piece === 'p' && row === 7);
        }

        for (let row = 0; row < 8; row++) {
            for (let col = 0; col < 8; col++) {
                const square = document.createElement('div');
                square.className = 'square ' + ((row + col) % 2 === 0 ? 'white-square' : 'black-square');
                square.dataset.row = row;
                square.dataset.col = col;
                board.appendChild(square);
            }
        }

        renderBoard();
        updateFen();

        board.addEventListener('click', (e) => {
            const square = e.target.closest('.square');
            if (!square) return;

            const row = parseInt(square.dataset.row);
            const col = parseInt(square.dataset.col);
            const piece = boardState[row][col];

            if (selectedSquare === null) {
                // No piece selected - try to select a piece of current turn
                if (piece && getPieceColor(piece) === currentTurn) {
                    selectedSquare = { row, col };
                    square.classList.add('selected');
                }
            } else {
                // A piece is already selected
                const prevSquare = board.querySelector('.selected');
                prevSquare.classList.remove('selected');

                const fromRow = selectedSquare.row;
                const fromCol = selectedSquare.col;
                const fromPiece = boardState[fromRow][fromCol];
                const toPiece = boardState[row][col];

                if (row === fromRow && col === fromCol) {
                    // Clicked same square - deselect
                    selectedSquare = null;
                } else if (piece && getPieceColor(piece) === currentTurn) {
                    // 点击另一枚己方棋子 - 可能是王车易位
                    if ((fromPiece === 'K' || fromPiece === 'k') && Math.abs(col - fromCol) === 2) {
                        const side = col > fromCol ? 'K' : 'Q';
                        if (canCastle(currentTurn, side)) {
                            moveHistory.push({
                                type: 'castling',
                                color: currentTurn,
                                side: side,
                                prevTurn: currentTurn,
                                prevCastling: { ...castlingRights }
                            });
                            performCastling(currentTurn, side);
                            if (currentTurn === 'white') {
                                castlingRights.K = false;
                                castlingRights.Q = false;
                            } else {
                                castlingRights.k = false;
                                castlingRights.q = false;
                            }
                            selectedSquare = null;
                            currentTurn = currentTurn === 'white' ? 'black' : 'white';
                            renderBoard();
                            updateFen();
                            return;
                        }
                    }
                    selectedSquare = { row, col };
                    square.classList.add('selected');
                } else {
                    // 移动棋子
                    moveHistory.push({
                        from: { row: fromRow, col: fromCol },
                        to: { row: row, col: col },
                        captured: toPiece,
                        prevTurn: currentTurn,
                        prevCastling: { ...castlingRights }
                    });

                    if (toPiece === 'R' || toPiece === 'r') {
                        if (row === 7 && col === 0) castlingRights.Q = false;
                        if (row === 7 && col === 7) castlingRights.K = false;
                        if (row === 0 && col === 0) castlingRights.q = false;
                        if (row === 0 && col === 7) castlingRights.k = false;
                    }
                    if (fromPiece === 'K') {
                        castlingRights.K = false;
                        castlingRights.Q = false;
                    }
                    if (fromPiece === 'k') {
                        castlingRights.k = false;
                        castlingRights.q = false;
                    }
                    if (fromPiece === 'R' && fromRow === 7 && fromCol === 0) castlingRights.Q = false;
                    if (fromPiece === 'R' && fromRow === 7 && fromCol === 7) castlingRights.K = false;
                    if (fromPiece === 'r' && fromRow === 0 && fromCol === 0) castlingRights.q = false;
                    if (fromPiece === 'r' && fromRow === 0 && fromCol === 7) castlingRights.k = false;

                    boardState[row][col] = fromPiece;
                    boardState[fromRow][fromCol] = '';

                    if (needsPromotion(fromPiece, row)) {
                        selectedSquare = null;
                        renderBoard();
                        const color = getPieceColor(fromPiece);
                        showPromotionDialog(color, (promotedPiece) => {
                            boardState[row][col] = promotedPiece;
                            currentTurn = currentTurn === 'white' ? 'black' : 'white';
                            renderBoard();
                            updateFen();
                        });
                        return;
                    }

                    selectedSquare = null;
                    currentTurn = currentTurn === 'white' ? 'black' : 'white';
                    renderBoard();
                    updateFen();
                }
            }
        });
    </script>
</body>
</html>
